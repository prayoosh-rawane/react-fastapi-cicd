name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # Install dependencies
      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # Run linting
      - name: Run lint
        working-directory: frontend
        run: npm run lint --if-present

      # Run tests
      - name: Run tests
        working-directory: frontend
        run: npm run test

  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Run lint
        working-directory: backend
        run: ruff check .

      - name: Run tests
        working-directory: backend
        run: pytest

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]

      steps:
        - uses: actions/checkout@v4

        - name: Build ${{ matrix.service }} image
          run: docker build -t ${{ matrix.service }}:ci ./${{ matrix.service }}
