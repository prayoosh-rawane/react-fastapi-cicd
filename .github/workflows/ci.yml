name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository
      - name: Checkout repository
      - uses: actions/checkout@v4

      # Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # Install dependencies
      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      # Run linting
      - name: Run lint
        run: |
          cd frontend
          npm run lint --if-present

      # Run tests
      - name: Run tests
        run: |
          cd frontend
          npm run build
